<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KARMAKS LLC | Truck & Trailer Aftermarket Parts</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png?v=3" />
  <link rel="shortcut icon" href="/favicon.png?v=3" />
  <link rel="apple-touch-icon" href="/favicon.png?v=3" />

  <!-- Font (clean + industrial) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#ffffff;
      --muted: rgba(255,255,255,.78);
      --muted2: rgba(255,255,255,.62);
      --line: rgba(255,255,255,.14);
      --red:#ff2a2a;
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: "Montserrat", Arial, sans-serif;
      color:var(--text);
      text-align:center;

      /* Background image */
      background:
        radial-gradient(1200px 600px at 70% 40%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)),
        url("./truck.jpeg.png?v=3");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 16px 64px;
    }

    .card{
      width:min(920px, 94vw);
      border:1px solid var(--line);
      border-radius: 18px;
      padding: 34px 22px;
      background: rgba(0,0,0,.26);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
    }

    h1{
      margin: 0 0 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: clamp(34px, 5.2vw, 58px);
      line-height: 1.05;
    }

    .sub{
      margin: 0;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: clamp(14px, 2.1vw, 18px);
    }

    .bar{
      width: 110px;
      height: 3px;
      margin: 18px auto 18px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      border-radius: 999px;
      opacity: .95;
    }

    .status{
      margin: 0;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: clamp(14px, 2.2vw, 18px);
      color: var(--red);
    }

    .meta{
      margin: 14px auto 0;
      color: var(--muted2);
      font-size: clamp(12px, 1.9vw, 14px);
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .contact{
      margin-top: 24px;
      display:inline-flex;
      flex-direction: column;
      gap: 10px;
      align-items:center;
    }

    .tag{
      display:inline-block;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted2);
      background: rgba(0,0,0,.18);
    }

    .mail{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight: 600;
      letter-spacing: .06em;
      text-decoration:none;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .mail:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.26);
    }

    .footer-note{
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: .72;
      letter-spacing: .30em;
      text-transform: uppercase;
      color: rgba(255,255,255,.75);
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
    }

    /* Mobile spacing */
    @media (max-width: 480px){
      .card{ padding: 28px 16px; }
      .meta{ letter-spacing: .18em; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>KARMAKS LLC</h1>
      <p class="sub">Truck & Trailer Aftermarket Parts</p>

      <div class="bar"></div>

      <p class="status">Sourcing & Distribution in Progress</p>
      <div class="meta">Global Sourcing • Private Label • Aftermarket Parts</div>

      <div class="contact">
        <span class="tag">Contact</span>
        <a class="mail" href="mailto:kara@karmaks.com">kara@karmaks.com</a>
      </div>
    </div>
  </div>

  <div class="footer-note">02.02</div>
</body>
</html>
